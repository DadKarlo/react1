networks:
  dev:

services:
  nginx:
    image: nginx:stable-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - './nginx.conf:/etc/nginx/nginx.conf'
      - './certs:/etc/nginx/certs'
    depends_on:
      - backend
      - frontend
    networks:
      - dev

  backend:
    build:
      context: ./API
    networks:
      - dev

  frontend:
    build:
      context: ./SITE
    networks:
      - dev
